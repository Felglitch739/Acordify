name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Inyectar API Key de Gemini
      run: echo "gemini.api.key=${{ secrets.GEMINI_API_KEY }}" >> local.properties

    # Instalamos Gradle directamente en el servidor de GitHub
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Usamos el comando global "gradle" en lugar del archivo local "./gradlew"
    - name: Compilar el APK
      run: gradle assembleDebug

    # Usamos comodines (**/*.apk) para que GitHub busque el APK en cualquier carpeta
    - name: Subir el APK para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Mi-App-Android
        path: '**/*.apk'
