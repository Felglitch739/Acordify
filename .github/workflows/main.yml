name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '21' # ¡Aquí está el cambio a Java 21!
        distribution: 'temurin'

    - name: Inyectar API Key de Gemini
      run: echo "gemini.api.key=${{ secrets.GEMINI_API_KEY }}" >> local.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    - name: Compilar el APK
      # Agregamos --no-configuration-cache para matar el bug de raíz
      run: gradle assembleDebug --no-daemon --no-configuration-cache

    - name: Subir el APK para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Acordify-APK
        path: '**/*.apk'
